<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Form</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Nunito', sans-serif;
  background: #eef3ef;
  margin: 0;
}

.container {
  max-width: 520px;
  margin: auto;
  background: #fff;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#124734,#1ebe57);
  padding: 20px;
  color: white;
}

.header h1 {
  font-size: 20px;
  font-weight: 800;
}

/* FORM */
.form {
  padding: 18px;
}

label {
  font-weight: 700;
  font-size: 13px;
  margin-top: 12px;
  display: block;
}

/* INPUTS SMALLER */
input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 2px solid #e2ece7;
  font-size: 14px;
  font-weight: 600;
}

input:focus, select:focus {
  border-color: #1ebe57;
  outline: none;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 18px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg,#25D366,#1ebe57);
  color: white;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Survey Form</h1>
</div>

<div class="form">

<form id="form">

<label>WhatsApp Number *</label>
<input 
  type="tel" 
  name="whatsapp" 
  placeholder="e.g. 9876543210"
  maxlength="10"
  required
>

<label>1. Do you know about health insurance?</label>
<select name="q1">
  <option>Good understanding</option>
  <option>Somewhat</option>
  <option>Not sure</option>
</select>

<label>2. Have you taken any insurance?</label>
<select name="q2">
  <option>Yes, currently</option>
  <option>Had in past</option>
  <option>Never</option>
</select>

<label>3. Any current medical condition?</label>
<select name="q3">
  <option>None</option>
  <option>Manageable</option>
  <option>Serious</option>
</select>

<label>4. Expected medical cost?</label>
<select name="q4">
  <option>₹2 Lakh</option>
  <option>₹5 Lakh</option>
  <option>Above ₹10 Lakh</option>
</select>

<label>5. Best way to pay critical illness?</label>
<select name="q5">
  <option>Out of pocket</option>
  <option>Insurance</option>
  <option>Friends/Relatives</option>
  <option>Not sure</option>
</select>

<label>Name</label>
<input type="text" name="name" placeholder="Optional">

<button type="submit">Submit</button>

</form>

</div>
</div>

<script>
const scriptURL = "PASTE_YOUR_WEB_APP_URL";

const form = document.getElementById("form");

/* FORCE 10 DIGIT INPUT */
document.querySelector("input[name='whatsapp']").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 10);
});

form.addEventListener("submit", async function(e){
  e.preventDefault();

  const whatsapp = form.whatsapp.value;

  if (whatsapp.length !== 10) {
    alert("Please enter a valid 10-digit WhatsApp number");
    return;
  }

  const data = Object.fromEntries(new FormData(this).entries());

  await fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Submitted successfully!");
  form.reset();
});
</script>

</body>
</html>
