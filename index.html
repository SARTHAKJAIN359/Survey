<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Form</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg,#eef7f1,#e6f4ea);
  margin: 0;
}

/* MAIN CARD */
.container {
  max-width: 520px;
  margin: 20px auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#0f5132,#1ebe57);
  padding: 22px;
  color: white;
}

.header h1 {
  margin: 0;
  font-size: 20px;
  font-weight: 800;
}

/* FORM */
.form {
  padding: 20px;
}

label {
  font-size: 13px;
  font-weight: 700;
  margin-top: 14px;
  display: block;
  color: #2c3e50;
}

/* INPUTS FIXED */
input, select {
  width: 100%;
  box-sizing: border-box; /* FIX OVERFLOW */
  padding: 12px;
  margin-top: 6px;
  border-radius: 10px;
  border: 2px solid #e4ece7;
  font-size: 14px;
  font-weight: 600;
  background: #f9fbfa;
  transition: 0.2s;
}

/* FOCUS EFFECT */
input:focus, select:focus {
  border-color: #1ebe57;
  background: #ffffff;
  outline: none;
  box-shadow: 0 0 0 3px rgba(30,190,87,0.12);
}

/* DROPDOWN STYLE */
select {
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg fill='%23666' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
}

/* BUTTON */
button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg,#25D366,#1ebe57);
  color: white;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 6px 18px rgba(30,190,87,0.25);
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
}

/* MOBILE */
@media(max-width:600px){
  .container {
    margin: 0;
    border-radius: 0;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>Survey Form</h1>
</div>

<div class="form">

<form id="form">

<label>WhatsApp Number *</label>
<input 
  type="tel"
  name="whatsapp"
  placeholder="e.g. 9876543210"
  maxlength="10"
  required
>

<label>1. Do you know about health insurance?</label>
<select name="q1" required>
  <option value="" disabled selected>Select an option</option>
  <option>Good understanding</option>
  <option>Somewhat</option>
  <option>Not sure</option>
</select>

<label>2. Have you taken any insurance?</label>
<select name="q2" required>
  <option value="" disabled selected>Select an option</option>
  <option>Yes, currently</option>
  <option>Had in past</option>
  <option>Never</option>
</select>

<label>3. Any current medical condition?</label>
<select name="q3" required>
  <option value="" disabled selected>Select an option</option>
  <option>None</option>
  <option>Manageable</option>
  <option>Serious</option>
</select>

<label>4. Expected medical cost?</label>
<select name="q4" required>
  <option value="" disabled selected>Select an option</option>
  <option>₹2 Lakh</option>
  <option>₹5 Lakh</option>
  <option>Above ₹10 Lakh</option>
</select>

<label>5. Best way to pay critical illness?</label>
<select name="q5" required>
  <option value="" disabled selected>Select an option</option>
  <option>Out of pocket</option>
  <option>Insurance</option>
  <option>Friends/Relatives</option>
  <option>Not sure</option>
</select>

<label>Name</label>
<input type="text" name="name" placeholder="Optional">

<button type="submit">Submit</button>

</form>

</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzeR1CC3QcEPIvE8veAX9P3gyP0ILTwrm2g1UmpOPZ_PjHCPY_F3Thf2aFMC6sl9exWOg/exec";

const form = document.getElementById("form");

/* 10 DIGIT STRICT */
document.querySelector("input[name='whatsapp']").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 10);
});

form.addEventListener("submit", async function(e){
  e.preventDefault();

  if (form.whatsapp.value.length !== 10) {
    alert("Enter valid 10-digit number");
    return;
  }

  const data = Object.fromEntries(new FormData(this).entries());

  await fetch(scriptURL, {
    method: "POST",
    body: JSON.stringify(data)
  });

  alert("Submitted successfully!");
  form.reset();
});
</script>

</body>
</html>
