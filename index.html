<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Form</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Nunito', sans-serif;
  margin: 0;
  background: #eef5f1;
  display: flex;
  justify-content: center;
}

/* CARD */
.wrapper {
  width: 100%;
  max-width: 420px;
  margin: 20px;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  overflow: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(135deg,#0f5132,#1ebe57);
  padding: 16px;
  color: white;
}

.header h1 {
  margin: 0;
  font-size: 18px;
}

/* FORM */
.form {
  padding: 16px;
}

.field {
  margin-bottom: 14px;
}

label {
  font-size: 13px;
  font-weight: 700;
}

/* INPUT */
input, select {
  width: 100%;
  padding: 11px;
  margin-top: 5px;
  border-radius: 10px;
  border: 2px solid #e4ece7;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#25D366,#1ebe57);
  color: white;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
}

/* SUCCESS */
.success {
  display: none;
  text-align: center;
  padding: 50px 20px;
}

.success h2 {
  color: #1ebe57;
}

.timer {
  margin-top: 10px;
  color: #666;
}

/* MOBILE FULL */
@media(max-width:480px){
  .wrapper {
    margin: 0;
    border-radius: 0;
    min-height: 100vh;
  }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="header">
  <h1>Survey Form</h1>
</div>

<div class="form" id="formSection">

<form id="form">

<div class="field">
<label>WhatsApp Number *</label>
<input type="tel" name="whatsapp" placeholder="e.g. 9876543210" maxlength="10" required>
</div>

<div class="field">
<label>1. Do you know about health insurance?</label>
<select name="q1" required>
<option value="" disabled selected>Select an option</option>
<option>Good understanding</option>
<option>Somewhat</option>
<option>Not sure</option>
</select>
</div>

<div class="field">
<label>2. Have you taken any insurance?</label>
<select name="q2" required>
<option value="" disabled selected>Select an option</option>
<option>Yes, currently</option>
<option>Had in past</option>
<option>Never</option>
</select>
</div>

<div class="field">
<label>3. Any current medical condition?</label>
<select name="q3" required>
<option value="" disabled selected>Select an option</option>
<option>None</option>
<option>Manageable</option>
<option>Serious</option>
</select>
</div>

<div class="field">
<label>4. Expected medical cost?</label>
<select name="q4" required>
<option value="" disabled selected>Select an option</option>
<option>₹2 Lakh</option>
<option>₹5 Lakh</option>
<option>Above ₹10 Lakh</option>
</select>
</div>

<div class="field">
<label>5. Best way to pay critical illness?</label>
<select name="q5" required>
<option value="" disabled selected>Select an option</option>
<option>Out of pocket</option>
<option>Insurance</option>
<option>Friends/Relatives</option>
<option>Not sure</option>
</select>
</div>

<div class="field">
<label>Name *</label>
<input type="text" name="name" required placeholder="Enter your name">
</div>

<button id="submitBtn">Submit</button>

</form>
</div>

<!-- SUCCESS -->
<div class="success" id="successScreen">
  <h2>✅ Survey Completed</h2>
  <p>Thank you for your response!</p>
  <div class="timer">Opening WhatsApp...</div>
</div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxYWOHM1Eg6mcXW7sRYvuLwlQPRiCGzOCL5utBLciMhwz_Qs98VBpxXw5KzVR94tSmx-g/exec";
const form = document.getElementById("form");

/* BLOCK MULTIPLE SUBMISSIONS */
if (localStorage.getItem("submitted")) {
  document.getElementById("formSection").style.display = "none";
  document.getElementById("successScreen").style.display = "block";
}

/* 10 DIGIT ONLY */
document.querySelector("input[name='whatsapp']").addEventListener("input", function() {
  this.value = this.value.replace(/\D/g, '').slice(0, 10);
});

document.getElementById("submitBtn").addEventListener("click", (e) => {
  e.preventDefault();

  if (form.whatsapp.value.length !== 10) {
    alert("Enter valid 10-digit number");
    return;
  }

  if (!form.checkValidity()) {
    form.reportValidity();
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;

  const data = Object.fromEntries(new FormData(form).entries());

  // 🔥 SEND DATA (FIXED)
  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  }).catch(() => {});

  localStorage.setItem("submitted", "true");

  document.getElementById("formSection").style.display = "none";
  document.getElementById("successScreen").style.display = "block";

  // ✅ WHATSAPP REDIRECT
  const message = encodeURIComponent(
    `Hi, I just filled your survey. I want to redeem my free health insurance consultation.`
  );

  setTimeout(() => {
    window.location.href = `https://wa.me/919911502502?text=${message}`;
  }, 1500);
});
</script>

</body>
</html>
